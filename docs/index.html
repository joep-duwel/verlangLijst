<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mijn verlang lijstje</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="tit">
        <h1>Mijn verlang lijstje</h1>
        <p class="p1">als je op het product clickt ga naar he website waar je het kan kopen</p>
        <img class="sint-img" src="img/sint.png" alt="" />
      </div>
    </header>
    <main>
<div class="container">

  <div class="cards">
    <a href="https://www.lego.com/nl-nl/product/porsche-911-gt3-rs-super-car-77239" target="_blank">
      <div class="card-content">
        <img style="width: 300px;" class="img-pro" src="img/LEGO-77239_Prod.jpg" alt="" />
        <div class="text-content">
          <h4>lego porsche 911 gt3 rs</h4>
            </a>
          <button class="copy-button" data-name="LEGO Porsche 911 GT3 RS" onclick="copyProductName(this)">Kopieer naam</button>
        </div>
      </div>

  </div>

  <div class="cards">
    <a href="https://www.lego.com/nl-nl/product/porsche-911-gt3-rs-super-car-77239" target="_blank">
      <div class="card-content">
        <img style="width: 300px;" class="img-pro" src="https://www.lego.com/cdn/cs/set/assets/blt0874acf12357a48e/77237_Prod.png?fit=bounds&format=jpg&quality=80&width=1500&height=1500&dpr=1" alt="" />
        <div class="text-content">
          <h4>Dodge Challenger SRT Hellcat </h4>
            </a>
          <button class="copy-button" data-name="LEGO Dodge Challenger SRT Hellcat sportauto" onclick="copyProductName(this)">Kopieer naam</button>
        </div>
      </div>
  </div>

    <div class="cards">
    <a href="https://www.lego.com/nl-nl/product/porsche-911-gt3-rs-super-car-77239" target="_blank">
      <div class="card-content">
        <img style="width: 300px;" class="img-pro" src="" alt="" />
        <div class="text-content">
          <h4>...</h4>
            </a>
          <button class="copy-button" data-name="..." onclick="copyProductName(this)">Kopieer naam</button>
        </div>
      </div>
  </div>

      <div class="cards">
    <a href="https://www.lego.com/nl-nl/product/porsche-911-gt3-rs-super-car-77239" target="_blank">
      <div class="card-content">
        <img style="width: 300px;" class="img-pro" src="" alt="" />
        <div class="text-content">
          <h4>...</h4>
            </a>
          <button class="copy-button" data-name="..." onclick="copyProductName(this)">Kopieer naam</button>
        </div>
      </div>
  </div>
</div>

      
    </main>

      <footer>
        <div class="foot-img"></div>
      </footer>
      <script>
        function copyProductName(button) {
          // Haal de productnaam op uit het data-attribute
          const productName = button.getAttribute("data-name");

          // Kopieer de tekst naar het klembord
          navigator.clipboard
            .writeText(productName)
            .then(() => {
              alert("Productnaam gekopieerd naar klembord!");
            })
            .catch((err) => {
              console.error("Fout bij kopiëren: ", err);
            });
        }
      </script>
    </main>
  </body>
</html>
